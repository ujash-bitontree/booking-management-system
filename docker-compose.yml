services:
  postgres:
    image: postgres:16
    container_name: booking_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doctor_booking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: booking_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking_backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      # Ensure container-to-container connectivity
      database.host: postgres
      redis.host: redis
      # Some projects use different env var names; these defaults are safe to override
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

